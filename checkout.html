<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - LACACA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="checkout-nav">
    <a href="index.html">← Kembali ke Shop</a>
    <h2>LACACA Checkout</h2>
</nav>

<section class="checkout-page section-p1">

    <div class="checkout-wrapper">

        <div class="customer-form">
            <h3>📦 Data Pengiriman</h3>

            <label>Nama Lengkap</label>
            <input type="text" placeholder="Masukkan nama">

            <label>Nomor HP</label>
            <input type="text" placeholder="08xxxxxxxxxx">

            <label>Alamat</label>
            <textarea placeholder="Masukkan alamat lengkap"></textarea>

            <label>Metode Pembayaran</label>
            <select>
                <option>Transfer Bank</option>
                <option>E-Wallet</option>
                <option>COD</option>
            </select>
        </div>

        <div class="order-box">
            <h3>🛒 Ringkasan Pesanan</h3>

            <div class="product-checkout">
                <img id="checkout-img" src="">
                <div>
                    <h4 id="checkout-name"></h4>
                    <p>Qty: 1</p>
                </div>
                <span id="checkout-price"></span>
            </div>

            <hr>

            <div class="price-row">
                <span>Subtotal</span>
                <span id="subtotal-price"></span>
            </div>

            <div class="price-row">
                <span>Ongkir</span>
                <span>$5</span>
            </div>

            <div class="price-row total-row">
                <span>Total</span>
                <span id="total-price"></span>
            </div>

            <button class="pay-btn">
                Checkout Sekarang
            </button>
        </div>

    </div>
</section>

<script>
let img = localStorage.getItem("productImage");
let name = localStorage.getItem("productName");
let price = localStorage.getItem("productPrice");

document.getElementById("checkout-img").src = img;
document.getElementById("checkout-name").innerText = name;
document.getElementById("checkout-price").innerText = price;
document.getElementById("subtotal-price").innerText = price;

let harga = parseInt(price.replace("$",""));
document.getElementById("total-price").innerText = "$" + (harga + 5);
</script>

</body>
</html>
